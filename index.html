<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>템플릿 쇼케이스</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      font-family: 'Noto Sans KR', sans-serif;
      overflow: hidden;
    }

    #app {
      display: flex;
      width: 100vw;
      height: 100vh;
      background: transparent;
      overflow: hidden;
    }

    /* ── 왼쪽 패널 ── */
    #panel {
      width: 420px;
      flex-shrink: 0;
      background: transparent;
      border-right: 1px solid rgba(255,255,255,0.10);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #panel-header {
      padding: 20px 16px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    #panel-header p {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.10em;
      text-transform: uppercase;
    }

    #template-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      scrollbar-width: none;
    }
    #template-list::-webkit-scrollbar { display: none; }

    .tpl-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid transparent;
      background: transparent;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      margin-bottom: 4px;
      color: rgba(255,255,255,0.75);
    }
    .tpl-btn:hover {
      background: rgba(255,255,255,0.05);
    }
    .tpl-btn.active {
      border-color: var(--tpl-color-alpha);
      background: var(--tpl-color-bg);
    }
    .tpl-btn.active .tpl-label {
      color: var(--tpl-color);
    }

    .tpl-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      background: var(--tpl-color-bg);
      border: 1px solid var(--tpl-color-alpha);
    }

    .tpl-label {
      font-size: 13px;
      font-weight: 600;
    }

    .tpl-dot {
      margin-left: auto;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--tpl-color);
      flex-shrink: 0;
      display: none;
    }
    .tpl-btn.active .tpl-dot { display: block; }

    #panel-footer {
      padding: 14px 10px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    #cta-btn {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      transition: opacity 0.15s;
    }
    #cta-btn:hover { opacity: 0.85; }

    /* ── 오른쪽 미리보기 ── */
    #preview {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: transparent;
    }

    #preview iframe {
      flex: 1;
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
    }
  </style>
</head>
<body>
  <div id="app">

    <!-- 왼쪽 패널 -->
    <div id="panel">
      <div id="panel-header"><p>템플릿</p></div>
      <div id="template-list"></div>
      <div id="panel-footer">
        <button id="cta-btn">이 템플릿으로 시작</button>
      </div>
    </div>

    <!-- 오른쪽 미리보기 -->
    <div id="preview">
      <iframe id="preview-frame" allowtransparency="true" title="미리보기"></iframe>
    </div>

  </div>

  <script>
    const TEMPLATES = [
      {
        id: "wedding",
        label: "모바일 청첩장",
        emoji: "💍",
        color: "#EC4899",
        html: `
          <div style="font-family:'Noto Serif KR',serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:linear-gradient(135deg,#fce7f3,#fbcfe8);padding:40px 24px;text-align:center;gap:16px;">
            <div style="font-size:48px;">💍</div>
            <h1 style="font-size:26px;font-weight:700;color:#9d174d;margin:0;">김민준 ♥ 이서연</h1>
            <p style="font-size:14px;color:#be185d;margin:0;line-height:2;">2025년 10월 18일 토요일<br/>오후 2시 30분</p>
            <p style="font-size:13px;color:#db2777;margin:0;">서울 강남구 그랜드 인터컨티넨탈 호텔</p>
            <div style="width:60px;height:1px;background:#f9a8d4;margin:8px 0;"></div>
            <p style="font-size:12px;color:#ec4899;margin:0;line-height:1.8;">두 사람이 하나가 되는 날<br/>함께 축복해 주세요</p>
            <button style="margin-top:16px;padding:12px 32px;border-radius:28px;border:none;background:#ec4899;color:#fff;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(236,72,153,0.35);">참석 여부 전달하기</button>
          </div>
        `
      },
      {
        id: "qr",
        label: "QR 키오스크",
        emoji: "🍽️",
        color: "#F59E0B",
        html: `
          <div style="font-family:'Noto Sans KR',sans-serif;display:flex;flex-direction:column;align-items:center;height:100%;background:#1a1a2e;padding:28px 20px;gap:14px;overflow:hidden;">
            <div style="display:flex;align-items:center;gap:10px;">
              <span style="font-size:24px;">🍽️</span>
              <h1 style="font-size:18px;font-weight:700;color:#fbbf24;margin:0;">맛있는 식당</h1>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;">
              <div style="background:#16213e;border:1px solid rgba(251,191,36,0.2);border-radius:12px;padding:14px 12px;text-align:center;"><div style="font-size:22px;margin-bottom:6px;">🍱</div><div style="font-size:11px;color:#fbbf24;font-weight:600;">불고기 정식 ₩12,000</div></div>
              <div style="background:#16213e;border:1px solid rgba(251,191,36,0.2);border-radius:12px;padding:14px 12px;text-align:center;"><div style="font-size:22px;margin-bottom:6px;">🍲</div><div style="font-size:11px;color:#fbbf24;font-weight:600;">김치찌개 ₩9,000</div></div>
              <div style="background:#16213e;border:1px solid rgba(251,191,36,0.2);border-radius:12px;padding:14px 12px;text-align:center;"><div style="font-size:22px;margin-bottom:6px;">🥘</div><div style="font-size:11px;color:#fbbf24;font-weight:600;">된장찌개 ₩9,000</div></div>
              <div style="background:#16213e;border:1px solid rgba(251,191,36,0.2);border-radius:12px;padding:14px 12px;text-align:center;"><div style="font-size:22px;margin-bottom:6px;">🍚</div><div style="font-size:11px;color:#fbbf24;font-weight:600;">비빔밥 ₩10,000</div></div>
              <div style="background:#16213e;border:1px solid rgba(251,191,36,0.2);border-radius:12px;padding:14px 12px;text-align:center;"><div style="font-size:22px;margin-bottom:6px;">🥩</div><div style="font-size:11px;color:#fbbf24;font-weight:600;">삼겹살 ₩14,000</div></div>
              <div style="background:#16213e;border:1px solid rgba(251,191,36,0.2);border-radius:12px;padding:14px 12px;text-align:center;"><div style="font-size:22px;margin-bottom:6px;">🍜</div><div style="font-size:11px;color:#fbbf24;font-weight:600;">냉면 ₩10,000</div></div>
            </div>
            <button style="width:100%;padding:12px;border-radius:12px;border:none;background:#fbbf24;color:#1a1a2e;font-size:13px;font-weight:700;cursor:pointer;">주문하기</button>
          </div>
        `
      },
      {
        id: "booking",
        label: "AI 예약 페이지",
        emoji: "📅",
        color: "#A78BFA",
        html: `
          <div style="font-family:'Noto Sans KR',sans-serif;display:flex;flex-direction:column;align-items:center;height:100%;background:linear-gradient(160deg,#1e1b4b,#312e81);padding:28px 20px;gap:16px;overflow:hidden;">
            <div style="text-align:center;">
              <div style="font-size:36px;">✂️</div>
              <h1 style="font-size:18px;font-weight:700;color:#c4b5fd;margin:6px 0 0;">헤어살롱 예약</h1>
              <p style="font-size:11px;color:#a78bfa;margin:4px 0 0;">AI 챗봇이 24시간 예약을 도와드립니다</p>
            </div>
            <div style="width:100%;background:rgba(49,46,129,0.6);border-radius:14px;padding:14px;border:1px solid rgba(124,58,237,0.3);">
              <p style="font-size:11px;color:#c4b5fd;margin:0 0 10px;font-weight:600;">날짜 선택</p>
              <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <div style="padding:8px 14px;border-radius:10px;background:rgba(30,27,75,0.8);border:1px solid rgba(124,58,237,0.25);font-size:11px;color:#a78bfa;">6/28</div>
                <div style="padding:8px 14px;border-radius:10px;background:#7c3aed;border:1px solid #7c3aed;font-size:11px;color:#fff;">6/29</div>
                <div style="padding:8px 14px;border-radius:10px;background:rgba(30,27,75,0.8);border:1px solid rgba(124,58,237,0.25);font-size:11px;color:#a78bfa;">6/30</div>
                <div style="padding:8px 14px;border-radius:10px;background:rgba(30,27,75,0.8);border:1px solid rgba(124,58,237,0.25);font-size:11px;color:#a78bfa;">7/1</div>
                <div style="padding:8px 14px;border-radius:10px;background:rgba(30,27,75,0.8);border:1px solid rgba(124,58,237,0.25);font-size:11px;color:#a78bfa;">7/2</div>
              </div>
            </div>
            <div style="width:100%;background:rgba(49,46,129,0.6);border-radius:14px;padding:14px;border:1px solid rgba(124,58,237,0.3);">
              <p style="font-size:11px;color:#c4b5fd;margin:0 0 10px;font-weight:600;">시간 선택</p>
              <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <div style="padding:8px 14px;border-radius:10px;background:rgba(30,27,75,0.8);border:1px solid rgba(124,58,237,0.25);font-size:11px;color:#a78bfa;">10:00</div>
                <div style="padding:8px 14px;border-radius:10px;background:rgba(30,27,75,0.8);border:1px solid rgba(124,58,237,0.25);font-size:11px;color:#a78bfa;">11:00</div>
                <div style="padding:8px 14px;border-radius:10px;background:#7c3aed;border:1px solid #7c3aed;font-size:11px;color:#fff;">13:00</div>
                <div style="padding:8px 14px;border-radius:10px;background:rgba(30,27,75,0.8);border:1px solid rgba(124,58,237,0.25);font-size:11px;color:#a78bfa;">14:00</div>
                <div style="padding:8px 14px;border-radius:10px;background:rgba(30,27,75,0.8);border:1px solid rgba(124,58,237,0.25);font-size:11px;color:#a78bfa;">15:00</div>
              </div>
            </div>
            <button style="width:100%;padding:12px;border-radius:12px;border:none;background:#7c3aed;color:#fff;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(124,58,237,0.4);">예약 확정하기</button>
          </div>
        `
      },
      {
        id: "landing",
        label: "랜딩 페이지",
        emoji: "🚀",
        color: "#34D399",
        html: `
          <div style="font-family:'Noto Sans KR',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:linear-gradient(160deg,#064e3b,#065f46);padding:36px 24px;text-align:center;gap:16px;">
            <div style="font-size:44px;">🚀</div>
            <h1 style="font-size:22px;font-weight:800;color:#34d399;margin:0;line-height:1.4;">당신의 비즈니스를<br/>3분 만에 온라인으로</h1>
            <p style="font-size:12px;color:#6ee7b7;margin:0;line-height:1.8;">AI가 업종에 맞는 콘텐츠를 자동 생성<br/>복잡한 설정 없이 즉시 배포</p>
            <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
              <div style="padding:8px 16px;border-radius:20px;background:rgba(6,95,70,0.8);border:1px solid rgba(52,211,153,0.3);font-size:11px;color:#34d399;">✓ 무료 시작</div>
              <div style="padding:8px 16px;border-radius:20px;background:rgba(6,95,70,0.8);border:1px solid rgba(52,211,153,0.3);font-size:11px;color:#34d399;">✓ 고유 URL</div>
              <div style="padding:8px 16px;border-radius:20px;background:rgba(6,95,70,0.8);border:1px solid rgba(52,211,153,0.3);font-size:11px;color:#34d399;">✓ AI 자동 생성</div>
            </div>
            <button style="padding:14px 36px;border-radius:28px;border:none;background:#34d399;color:#064e3b;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 20px rgba(52,211,153,0.4);">무료로 시작하기 →</button>
          </div>
        `
      }
    ];

    let selected = TEMPLATES[0];

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function renderList() {
      const list = document.getElementById('template-list');
      list.innerHTML = '';
      TEMPLATES.forEach(tpl => {
        const isActive = tpl.id === selected.id;
        const btn = document.createElement('button');
        btn.className = 'tpl-btn' + (isActive ? ' active' : '');
        btn.style.setProperty('--tpl-color', tpl.color);
        btn.style.setProperty('--tpl-color-bg', hexToRgba(tpl.color, 0.10));
        btn.style.setProperty('--tpl-color-alpha', hexToRgba(tpl.color, 0.26));
        btn.innerHTML = `
          <div class="tpl-icon" style="--tpl-color:${tpl.color};--tpl-color-bg:${hexToRgba(tpl.color,0.10)};--tpl-color-alpha:${hexToRgba(tpl.color,0.26)};">${tpl.emoji}</div>
          <span class="tpl-label">${tpl.label}</span>
          <div class="tpl-dot"></div>
        `;
        btn.addEventListener('click', () => {
          selected = tpl;
          renderList();
          renderPreview();
          updateCta();
        });
        list.appendChild(btn);
      });
    }

    function renderPreview() {
      const frame = document.getElementById('preview-frame');
      frame.srcdoc = `<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box;}html,body{width:100%;height:100%;overflow:hidden;}</style>
</head><body style="width:100%;height:100vh;">${selected.html}</body></html>`;
    }

    function updateCta() {
      const btn = document.getElementById('cta-btn');
      btn.style.background = selected.color;
    }

    // 초기화
    renderList();
    renderPreview();
    updateCta();
  </script>
</body>
</html>
